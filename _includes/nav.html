<header class="site-header">
  <div class="container">
    <div class="header-shell">
      <div class="site-branding">
        <a class="brand-link" href="{{ site.baseurl }}/" aria-label="{{ site.title }}">
          <span class="brand-kicker">Equine Bodywork</span>
          <span class="brand-title">{{ site.title }}</span>
          <span class="brand-subtitle">{{ site.subtitle }}</span>
        </a>
      </div>
      <nav class="navbar" aria-label="Primary">
        <ul class="navbar-list">
          <li class="navbar-item"><a class="navbar-link" href="{{ site.baseurl }}/">Home</a></li>
          {% for page in site.pages %}
            {% if page.title %}
              {% if page.url != '/404.html' and page.url != '/' %}
                <li class="navbar-item">
                  <a class="navbar-link" href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
                </li>
              {% endif %}
            {% endif %}
          {% endfor %}
        </ul>
      </nav>
    </div>
  </div>
</header>
